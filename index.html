<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌挑选 · 请勾选您想保留的品牌</title>
<style>
  :root{
    --bg:#f5efe6; --paper:#ffffff; --ink:#1a1a1a; --muted:#6b6357;
    --rule:#e6dfd2; --accent:#c8451e; --accent-soft:#fde9d8;
    --keep:#2e7d32; --keep-soft:#e8f5e9; --drop:#9a9a9a; --drop-soft:#efefef;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;
  }
  body{max-width:1080px; margin:0 auto; padding:36px 20px 140px;}

  /* Header */
  .hero{border-bottom:2px solid var(--ink); padding-bottom:22px; margin-bottom:24px;}
  .eyebrow{font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); font-weight:700; margin-bottom:10px;}
  h1{font-size:30px; line-height:1.2; font-weight:800; letter-spacing:-.01em; margin-bottom:10px;}
  .sub{font-size:14px; color:var(--muted); max-width:680px;}

  /* Vendor + controls */
  .panel{
    background:var(--paper); border:1px solid var(--rule); border-radius:14px;
    padding:18px 20px; margin-bottom:22px; display:flex; flex-wrap:wrap;
    align-items:center; gap:14px 22px;
  }
  .field{display:flex; align-items:center; gap:10px;}
  .field label{font-size:14px; font-weight:600; white-space:nowrap;}
  .field input{
    font-size:15px; padding:9px 12px; border:1px solid var(--rule); border-radius:9px;
    min-width:200px; background:#fff; color:var(--ink);
  }
  .field input:focus{outline:none; border-color:var(--accent);}
  .counter{font-size:15px; font-weight:700; color:var(--accent); margin-left:auto;}
  .bulk{display:flex; gap:8px;}
  .bulk button{
    font-size:13px; padding:7px 12px; border:1px solid var(--rule); background:#fff;
    border-radius:8px; cursor:pointer; color:var(--muted);
  }
  .bulk button:hover{border-color:var(--accent); color:var(--accent);}

  .hint{font-size:13px; color:var(--muted); margin:-6px 0 18px; display:flex; align-items:center; gap:8px;}
  .hint .dot-keep,.hint .dot-drop{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .hint .dot-keep{background:var(--keep);} .hint .dot-drop{background:var(--drop);}

  /* Grid */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;}
  .card{
    background:var(--paper); border:1px solid var(--rule); border-radius:14px;
    overflow:hidden; display:flex; flex-direction:column; transition:all .18s;
    position:relative;
  }
  .card.keep{border-color:var(--keep); box-shadow:0 2px 0 0 var(--keep-soft);}
  .card.drop{opacity:.5; filter:grayscale(.7);}
  .card-top{display:flex; align-items:center; gap:12px; padding:16px 16px 10px;}
  .logo{
    width:48px; height:48px; border-radius:10px; object-fit:cover; flex-shrink:0;
    background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
    font-weight:800; color:var(--accent); font-size:18px; overflow:hidden;
  }
  .logo img{width:100%;height:100%;object-fit:cover;display:block;}
  .name-wrap{flex:1; min-width:0;}
  .name{font-size:16px; font-weight:700; line-height:1.3;}
  .cat{display:inline-block; margin-top:4px; font-size:11px; color:var(--accent);
    background:var(--accent-soft); padding:2px 8px; border-radius:20px;}
  .desc{font-size:13px; color:var(--muted); padding:0 16px 12px; line-height:1.55;}
  .products{display:flex; gap:6px; padding:0 16px 12px; flex-wrap:wrap;}
  .products img{width:62px; height:62px; border-radius:8px; object-fit:cover; cursor:zoom-in; border:1px solid var(--rule);}

  .toggle{display:flex; border-top:1px solid var(--rule); margin-top:auto;}
  .toggle button{
    flex:1; padding:11px 0; border:none; background:transparent; cursor:pointer;
    font-size:14px; font-weight:600; color:var(--muted); transition:all .15s;
  }
  .toggle button.t-keep.on{background:var(--keep-soft); color:var(--keep);}
  .toggle button.t-drop.on{background:var(--drop-soft); color:#555;}
  .toggle button:first-child{border-right:1px solid var(--rule);}
  .toggle button:hover{background:#faf6ef;}

  /* Footer action bar */
  .actionbar{
    position:fixed; left:0; right:0; bottom:0; background:rgba(245,239,230,.96);
    backdrop-filter:blur(8px); border-top:1px solid var(--rule); padding:14px 20px;
    display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; z-index:20;
  }
  .actionbar .summary{font-size:14px; color:var(--muted);}
  .actionbar .summary b{color:var(--ink);}
  .btn{
    font-size:15px; font-weight:700; padding:12px 26px; border-radius:10px; cursor:pointer; border:none;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#a8380f;}
  .btn-ghost{background:#fff; color:var(--ink); border:1px solid var(--rule);}
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent);}

  /* Modal */
  .overlay{position:fixed; inset:0; background:rgba(20,16,12,.7); display:none;
    align-items:center; justify-content:center; z-index:40; padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--paper); border-radius:16px; max-width:520px; width:100%; padding:26px;}
  .modal h3{font-size:20px; margin-bottom:6px;}
  .modal p{font-size:13px; color:var(--muted); margin-bottom:16px;}
  .link-box{display:flex; gap:8px; margin-bottom:14px;}
  .link-box input{flex:1; font-size:13px; padding:11px 12px; border:1px solid var(--rule);
    border-radius:9px; background:#faf6ef; color:var(--ink);}
  .modal .row{display:flex; gap:10px; flex-wrap:wrap;}
  .modal .ok{font-size:13px; color:var(--keep); margin-top:10px; min-height:18px; font-weight:600;}
  .img-overlay{position:fixed; inset:0; background:rgba(0,0,0,.85); display:none;
    align-items:center; justify-content:center; z-index:60; cursor:zoom-out;}
  .img-overlay.show{display:flex;}
  .img-overlay img{max-width:92vw; max-height:92vh; border-radius:10px;}
</style>
</head>
<body>
  <div class="hero">
    <div class="eyebrow">Brand Selection · 品牌挑选</div>
    <h1>请挑选您想<span style="color:var(--accent)">保留</span>的品牌</h1>
    <p class="sub">下面是全部品牌清单。默认每个品牌都是「保留」。把您不需要的点成「去掉」即可。
      选完后填写您的名称，点底部「生成结果」，把链接发回给我们就好。</p>
  </div>

  <div class="panel">
    <div class="field">
      <label for="vendor">您的名称</label>
      <input id="vendor" type="text" placeholder="例如：某某陶瓷厂 / 张厂长" autocomplete="off">
    </div>
    <div class="bulk">
      <button id="allKeep">全部保留</button>
      <button id="allDrop">全部去掉</button>
    </div>
    <div class="counter" id="counter">保留 0 / 共 0</div>
  </div>

  <div class="hint">
    <span class="dot-keep"></span> 保留 = 您想要的
    <span style="width:14px"></span>
    <span class="dot-drop"></span> 去掉 = 不需要（卡片会变灰）
  </div>

  <div class="grid" id="grid"></div>

  <div class="actionbar">
    <div class="summary" id="barSummary">保留 <b>0</b> 个，去掉 <b>0</b> 个</div>
    <button class="btn btn-primary" id="generate">生成结果 →</button>
  </div>

  <!-- 结果弹窗 -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>✅ 结果已生成</h3>
      <p>把下面这个链接复制，发回给我们（微信发即可）。我们一打开就能看到您的选择。</p>
      <div class="link-box">
        <input id="resultLink" readonly>
        <button class="btn btn-primary" id="copyLink" style="padding:11px 16px;font-size:14px;">复制</button>
      </div>
      <div class="row">
        <button class="btn btn-ghost" id="openResult">预览结果</button>
        <button class="btn btn-ghost" id="downloadJson">下载文件备份</button>
        <button class="btn btn-ghost" id="closeModal">关闭</button>
      </div>
      <div class="ok" id="modalOk"></div>
    </div>
  </div>

  <div class="img-overlay" id="imgOverlay"><img id="bigImg" alt=""></div>

<script src="data/brands.js"></script>
<script>
  const DRAFT_KEY = "collect_draft_v1";
  const grid = document.getElementById('grid');
  const vendorInput = document.getElementById('vendor');
  // 状态：id -> true(保留) / false(去掉)。默认全保留。
  let state = {};

  // 读取草稿
  (function loadDraft(){
    try{
      const raw = localStorage.getItem(DRAFT_KEY);
      if(raw){
        const d = JSON.parse(raw);
        if(d.vendor) vendorInput.value = d.vendor;
        if(d.state) state = d.state;
      }
    }catch(e){}
    // 补齐：新品牌默认保留
    BRANDS.forEach(b=>{ if(!(b.id in state)) state[b.id] = true; });
  })();

  function saveDraft(){
    try{
      localStorage.setItem(DRAFT_KEY, JSON.stringify({vendor:vendorInput.value.trim(), state}));
    }catch(e){}
  }

  function initials(name){
    const s = (name||"").replace(/^示例品牌\s*·\s*/,'').trim();
    return s ? s.slice(0,1) : "牌";
  }

  function render(){
    grid.innerHTML = '';
    BRANDS.forEach(b=>{
      const keep = state[b.id] !== false;
      const card = document.createElement('div');
      card.className = 'card ' + (keep ? 'keep':'drop');

      const logoHtml = b.logo
        ? `<img src="${b.logo}" alt="" onerror="this.parentNode.textContent='${initials(b.name)}'">`
        : initials(b.name);

      const prodHtml = (b.products && b.products.length)
        ? `<div class="products">${b.products.map(p=>`<img src="${p}" alt="" data-big="${p}" onerror="this.style.display='none'">`).join('')}</div>`
        : '';

      card.innerHTML = `
        <div class="card-top">
          <div class="logo">${logoHtml}</div>
          <div class="name-wrap">
            <div class="name">${escapeHtml(b.name)}</div>
            ${b.category ? `<span class="cat">${escapeHtml(b.category)}</span>`:''}
          </div>
        </div>
        ${b.desc ? `<div class="desc">${escapeHtml(b.desc)}</div>`:''}
        ${prodHtml}
        <div class="toggle">
          <button class="t-keep ${keep?'on':''}" data-id="${b.id}" data-v="1">保留</button>
          <button class="t-drop ${keep?'':'on'}" data-id="${b.id}" data-v="0">去掉</button>
        </div>`;
      grid.appendChild(card);
    });
    updateCounter();
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function updateCounter(){
    const total = BRANDS.length;
    const kept = BRANDS.filter(b=>state[b.id]!==false).length;
    document.getElementById('counter').textContent = `保留 ${kept} / 共 ${total}`;
    document.getElementById('barSummary').innerHTML = `保留 <b>${kept}</b> 个，去掉 <b>${total-kept}</b> 个`;
  }

  // 事件代理：切换 / 看大图
  grid.addEventListener('click', e=>{
    const btn = e.target.closest('.toggle button');
    if(btn){
      state[btn.dataset.id] = btn.dataset.v === '1';
      saveDraft(); render(); return;
    }
    const img = e.target.closest('.products img');
    if(img && img.dataset.big){
      document.getElementById('bigImg').src = img.dataset.big;
      document.getElementById('imgOverlay').classList.add('show');
    }
  });
  document.getElementById('imgOverlay').addEventListener('click',e=>{
    e.currentTarget.classList.remove('show');
  });

  document.getElementById('allKeep').onclick = ()=>{BRANDS.forEach(b=>state[b.id]=true); saveDraft(); render();};
  document.getElementById('allDrop').onclick = ()=>{BRANDS.forEach(b=>state[b.id]=false); saveDraft(); render();};
  vendorInput.addEventListener('input', saveDraft);

  // 生成结果
  function buildPayload(){
    const kept=[], removed=[];
    BRANDS.forEach(b=> (state[b.id]!==false ? kept:removed).push(b.id));
    return {v:1, vendor:vendorInput.value.trim(), kept, removed, t:nowStamp()};
  }
  function nowStamp(){
    // 用本地时间字符串（避免依赖被禁用的 Date.now，浏览器里可用 new Date）
    const d=new Date(); const p=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function encodePayload(obj){
    // UTF-8 安全的 base64
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }
  function resultUrl(){
    const base = location.href.replace(/index\.html.*$/,'').replace(/[#?].*$/,'');
    return base.replace(/\/?$/,'/') + 'result.html#d=' + encodePayload(buildPayload());
  }

  const overlay = document.getElementById('overlay');
  document.getElementById('generate').onclick = ()=>{
    if(!vendorInput.value.trim()){
      vendorInput.focus(); vendorInput.style.borderColor='var(--accent)';
      alert('请先填写「您的名称」，方便我们区分是哪位厂商的选择～');
      return;
    }
    const url = resultUrl();
    document.getElementById('resultLink').value = url;
    document.getElementById('modalOk').textContent='';
    overlay.classList.add('show');
  };
  document.getElementById('closeModal').onclick = ()=> overlay.classList.remove('show');
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.classList.remove('show'); });

  document.getElementById('copyLink').onclick = async ()=>{
    const inp = document.getElementById('resultLink');
    try{ await navigator.clipboard.writeText(inp.value); }
    catch(e){ inp.select(); document.execCommand('copy'); }
    document.getElementById('modalOk').textContent='已复制，去微信发给我们就好 ✅';
  };
  document.getElementById('openResult').onclick = ()=> window.open(document.getElementById('resultLink').value,'_blank');
  document.getElementById('downloadJson').onclick = ()=>{
    const p = buildPayload();
    const blob = new Blob([JSON.stringify(p,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `品牌选择_${p.vendor||'未命名'}.json`;
    a.click();
    document.getElementById('modalOk').textContent='文件已下载，可作为备份发给我们 ✅';
  };

  render();
</script>
</body>
</html>
